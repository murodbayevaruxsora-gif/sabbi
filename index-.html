<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruxsora Murodbayeva</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      max-width: 480px;
      width: 100%;
      overflow: hidden;
    }
    .card-top {
      display: flex;
      align-items: stretch;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      color: white;
    }
    .photo-box {
      width: 140px;
      min-height: 160px;
      flex-shrink: 0;
    }
    .photo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .name-box {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .name-box h1 {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
    }
    .name-box p {
      font-size: 13px;
      opacity: 0.8;
      margin-top: 6px;
    }
    .card-body { padding: 24px 28px; }
    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .info-row:last-child { border-bottom: none; }
    .icon { font-size: 18px; min-width: 26px; text-align: center; margin-top: 2px; }
    .info-content label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: #94a3b8; font-weight: 600; }
    .info-content span { display: block; font-size: 14px; color: #1e293b; font-weight: 500; margin-top: 2px; }
    .card-footer { background: #f8fafc; padding: 14px 28px; text-align: center; font-size: 12px; color: #94a3b8; border-top: 1px solid #e2e8f0; }
  </style>
</head>
